document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er:1px solid #dde1e2;border-radius:10px;background:#fff;\">\n      <\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:16px 20px;margin-bottom:16px;display:inline-flex;gap:10px;align-items:baseline;\">\n        <span style=\"font-size:13px;color:#6b7479;\">Total abonado (todos los clientes)<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;\">{{ pagosTotalFmt }}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;\">\n        <sc-for list=\"{{ pagosList }}\" as=\"p\" hint-placeholder-count=\"6\">\n          <div style=\"border-bottom:1px solid #f4f6f6;\">\n            <div class=\"grow\" sc-camel-on-click=\"{{ p.toggleHist }}\" style=\"display:flex;padding:14px 0;font-size:14px;align-items:center;cursor:pointer;\">\n              <span style=\"flex:1;display:flex;align-items:center;gap:10px;\">\n                <span style=\"width:30px;height:30px;border-radius:50%;background:#0d1013;color:#5eead4;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;\">{{ p.nombre }}<\u002Fspan>\n                <span style=\"font-weight:600;\">{{ p.nombre }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"color:#9aa3ac;font-size:13px;margin-right:20px;\">{{ p.nPagos }} abonos<\u002Fspan>\n              <span style=\"font-weight:700;font-family:'Space Grotesk',sans-serif;\">{{ p.totalFmt }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ p.showHist }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#f7f8f8;border-radius:10px;padding:10px 14px;margin:0 0 14px;\">\n              <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9aa3ac;margin:2px 0 8px;\">Historial de pagos<\u002Fdiv>\n              <sc-for list=\"{{ p.pagos }}\" as=\"h\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;border-bottom:1px solid #eef1f1;\">\n                  <span style=\"color:#6b7479;\">{{ h.label }} · {{ h.producto }} · {{ h.fechaFmt }}<\u002Fspan>\n                  <span style=\"font-weight:600;\">{{ h.montoFmt }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== INVENTARIO ===== -->\n    <sc-if value=\"{{ isInv }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Inventario\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:18px;\">\n        <div>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:27px;\">Inventario<\u002Fdiv>\n          <div style=\"font-size:14px;color:#6b7479;\">{{ invStock }} en stock · {{ invTotal }} registros<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:center;\">\n          <input value=\"{{ invSearch }}\" sc-camel-on-input=\"{{ onInvSearch }}\" placeholder=\"Buscar producto, IMEI…\" style=\"width:220px;padding:10px 14px;border:1px solid #dde1e2;border-radius:10px;background:#fff;\">\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openInv }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:11px 17px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;\">+ Nuevo ingreso<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px;\">\n        <div class=\"gcard\" style=\"padding:16px 20px;\"><div style=\"font-size:13px;color:#6b7479;\">Unidades en stock<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;margin-top:4px;\">{{ invStock }}<\u002Fdiv><\u002Fdiv>\n        <div class=\"gcard\" style=\"padding:16px 20px;\"><div style=\"font-size:13px;color:#6b7479;\">Valor del inventario<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;margin-top:4px;\">{{ invValorFmt }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;\">\n        <div style=\"overflow-x:auto;\">\n        <div style=\"min-width:1080px;\">\n        <div style=\"display:flex;padding:14px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1.1;\">Compra<\u002Fspan><span style=\"flex:2.2;\">Producto<\u002Fspan><span style=\"flex:1;\">Condición<\u002Fspan><span style=\"flex:1.4;\">IMEI/Serial<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Costo<\u002Fspan><span style=\"flex:1.2;text-align:right;\">PVP<\u002Fspan><span style=\"flex:.9;text-align:right;\">Edad<\u002Fspan><span style=\"flex:1.1;text-align:center;\">Estado<\u002Fspan><span style=\"flex:.7;text-align:right;\">Acción<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ invList }}\" as=\"it\" hint-placeholder-count=\"8\">\n          <div class=\"grow\" style=\"display:flex;padding:12px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1.1;color:#6b7479;font-size:13px;\">{{ it.fechaFmt }}<\u002Fspan>\n            <span style=\"flex:2.2;\"><span style=\"font-weight:600;\">{{ it.marca }} {{ it.modelo }}<\u002Fspan> <span style=\"color:#aab2ba;font-size:13px;\">{{ it.capacidad }} · {{ it.color }}<\u002Fspan><\u002Fspan>\n            <span style=\"flex:1;color:#4b5559;font-size:13px;\">{{ it.condicion }}<\u002Fspan>\n            <span style=\"flex:1.4;color:#9aa3ac;font-size:12px;\">{{ it.imei }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;color:#4b5559;\">{{ it.costoFmt }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;font-weight:600;\">{{ it.valorFmt }}<\u002Fspan>\n            <span style=\"flex:.9;text-align:right;color:{{ it.edadColor }};font-weight:600;font-size:13px;\">{{ it.edad }}<\u002Fspan>\n            <span style=\"flex:1.1;text-align:center;\"><span sc-camel-on-click=\"{{ it.onToggle }}\" style=\"background:{{ it.estBg }};color:{{ it.estFg }};font-size:12px;padding:4px 11px;border-radius:20px;cursor:pointer;\">{{ it.estLabel }}<\u002Fspan><\u002Fspan>\n            <span style=\"flex:.7;text-align:right;display:flex;gap:6px;justify-content:flex-end;\">\n              <span sc-camel-on-click=\"{{ it.onEdit }}\" title=\"Editar\" style=\"color:#7b8590;cursor:pointer;font-size:15px;padding:2px;\">✎<\u002Fspan>\n              <sc-if value=\"{{ it.canDel }}\" hint-placeholder-val=\"{{ false }}\">\n              <span sc-camel-on-click=\"{{ it.onDel }}\" title=\"Eliminar\" style=\"color:#c9cdd2;cursor:pointer;font-size:15px;padding:2px;\">✕<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n    <!-- ===== CONTABILIDAD ===== -->\n    <sc-if value=\"{{ isContGate }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Contabilidad\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:22px;\">\n        <div>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:27px;\">Contabilidad<\u002Fdiv>\n          <div style=\"font-size:14px;color:#6b7479;\">P&amp;G y flujo de efectivo · {{ periodLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:center;\">\n          <sc-raw-select value=\"{{ period }}\" sc-camel-on-change=\"{{ onPeriod }}\" style=\"background:#fff;border:1px solid #dde1e2;border-radius:10px;padding:10px 14px;font-size:14px;color:#3a4448;cursor:pointer;\">\n            <sc-for list=\"{{ periodOptions }}\" as=\"op\" hint-placeholder-count=\"3\"><option value=\"{{ op.value }}\">{{ op.label }}<\u002Foption><\u002Fsc-for>\n          <\u002Fsc-raw-select>\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openGasto }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:11px 17px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;\">+ Nuevo gasto<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showMigrar }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"gcard\" style=\"padding:16px 20px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-color:#f3d9cb;background:#fdf3ee;\">\n        <div style=\"font-size:14px;color:#b06a45;\">Detectamos datos guardados en este navegador (modo local anterior). Puedes subirlos una sola vez a la base de datos compartida.<\u002Fdiv>\n        <div class=\"gbtn\" sc-camel-on-click=\"{{ migrarLocal }}\" style=\"background:#0d1013;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;\">{{ migrarLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Estado de resultados (P&amp;G)<\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 22px 8px;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">Ingresos por ventas<\u002Fspan><span style=\"font-weight:600;\">{{ pygIngresosFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Costo de ventas<\u002Fspan><span style=\"font-weight:600;\">{{ pygCostoFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"font-weight:600;\">Utilidad bruta<\u002Fspan><span style=\"font-weight:700;\">{{ pygUtilBrutaFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Gastos operativos<\u002Fspan><span style=\"font-weight:600;\">{{ pygGastosFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Obligaciones bancarias<\u002Fspan><span style=\"font-weight:600;\">{{ pygObligFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;\">Utilidad neta<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:{{ pygUtilNetaColor }};\">{{ pygUtilNetaFmt }} <span style=\"font-size:13px;color:#9aa3ac;\">({{ pygMargenNeto }}%)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Flujo de efectivo <span style=\"font-weight:400;color:#9aa3ac;font-size:13px;\">· últimos 12 meses (entradas: contado + cuotas cobradas · salidas: gastos + compras de inventario)<\u002Fspan><\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:16px 20px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;\">\n        <div><label style=\"display:block;font-size:13px;color:#4b5559;margin-bottom:6px;\">Capital inicial (COP)<\u002Flabel><input data-field=\"monto\" type=\"number\" value=\"{{ capitalMonto }}\" sc-camel-on-input=\"{{ onCapital }}\" placeholder=\"0\" style=\"width:200px;padding:11px 13px;border:1px solid #dde ">{{ m.saldoAcumFmt }}<\u002Fspan>\n            <span style=\"flex:.7;text-align:right;\">\n              <sc-if value=\"{{ m.tieneMovs }}\" hint-placeholder-val=\"{{ false }}\">\n              <span sc-camel-on-click=\"{{ m.onVerDetalle }}\" style=\"color:#0d9488;cursor:pointer;font-size:13px;font-weight:600;\">Ver<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Capital inyectado <span style=\"font-weight:400;color:#9aa3ac;font-size:13px;\">· aportes adicionales de socios/dueño después del arranque<\u002Fspan><\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:flex-end;padding:14px 0 4px;\">\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openCapital }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;\">+ Nuevo ingreso de capital<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;padding:10px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1.1;\">Fecha<\u002Fspan><span style=\"flex:2.6;\">Descripción<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Monto<\u002Fspan><span style=\"flex:.6;text-align:right;\">Acción<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ capitalInyList }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <div class=\"grow\" style=\"display:flex;padding:12px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1.1;color:#6b7479;font-size:13px;\">{{ c.fechaFmt }}<\u002Fspan>\n            <span style=\"flex:2.6;\">{{ c.descripcion }}<\u002Fspan>\n t.condicion,imei:it.imei||'',proveedor:it.proveedor||'',cantidad:it.cantidad||1,\n      costo_cop:it.costoCop||0,valor_venta:it.valorVenta||0,vendido:!!it.vendido,fecha_venta:it.fechaVenta||null})),{onConflict:'id'}),'inventario'); }\n  async syncGastos(rows){ if(!rows.length)return; this.checkErr(await this.supabase.from('gastos').upsert(rows.map(g=>({id:g.id,fecha:g.fecha,categoria:g.categoria,descripcion:g.descripcion,monto:g.monto||0})),{onConflict:'id'}),'gastos'); }\n  async syncCapitalInicial(ci){ this.checkErr(await this.supabase.from('capital_inicial').upsert({id:1,monto:ci.monto||0,fecha:ci.fecha}),'capital_inicial'); }\n  async syncCapitalInyectado(rows){ if(!rows.length)return; this.checkErr(await this.supabase.from('capital_inyectado').upsert(rows.map(c=>({id:c.id,fecha:c.fecha,descripcion:c.descripcion,monto:c.monto||0})),{onConflict:'id'}),'capital_inyectado'); }\n  async syncObligaciones(rows){ if(!rows.length)return; this.checkErr(await this.supabase.from('obligaciones').upsert(rows.map(o=>({id:o.id,entidad:o.entidad,tipo:o.tipo,frecuencia:o.frecuencia||'MENSUAL',monto_cuota:o.montoCuota||0,\n      dia_pago:o.diaPago||1,fecha_inicio:o.fechaInicio,cuotas_totales:o.cuotasTotales||0,activa:!!o.activa})),{onConflict:'id'}),'obligaciones'); }\n  // borrados puntuales — solo afectan el registro específico, sin tocar el resto de la tabla\n  async deleteVentaRemote(id){ this.trackSync((async()=>this.checkErr(await this.supabase.from('ventas').delete().eq('id',id),'eliminar venta'))()); }\n  async deleteInvRemote(id){ this.trackSync((async()=>this.checkErr(await this.supabase.from('inventario').delete().eq('id',id),'eliminar inventario'))()); }\n  async deleteGastoRemote(id){ this.trackSync((async()=>this.checkErr(await this.supabase.from('gastos').delete().eq('id',id),'eliminar gasto'))()); }\n  async deleteCapitalInjRemote(id){ this.trackSync((async()=>this.checkErr(await this.supabase.from('capital_inyectado').delete().eq('id',id),'eliminar capital'))());
