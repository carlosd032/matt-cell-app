  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lect value=\"{{ period }}\" sc-camel-on-change=\"{{ onPeriod }}\" style=\"background:#fff;border:1px solid #dde1e2;border-radius:10px;padding:10px 14px;font-size:14px;color:#3a4448;cursor:pointer;\">\n            <sc-for list=\"{{ periodOptions }}\" as=\"op\" hint-placeholder-count=\"3\"><option value=\"{{ op.value }}\">{{ op.label }}<\u002Foption><\u002Fsc-for>\n          <\u002Fsc-raw-select>\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openGasto }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:11px 17px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;\">+ Nuevo gasto<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showMigrar }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"gcard\" style=\"padding:16px 20px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-color:#f3d9cb;background:#fdf3ee;\">\n        <div style=\"font-size:14px;color:#b06a45;\">Detectamos datos guardados en este navegador (modo local anterior). Puedes subirlos una sola vez a la base de datos compartida.<\u002Fdiv>\n        <div class=\"gbtn\" sc-camel-on-click=\"{{ migrarLocal }}\" style=\"background:#0d1013;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;\">{{ migrarLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Estado de resultados (P&amp;G)<\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 22px 8px;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">Ingresos por ventas<\u002Fspan><span style=\"font-weight:600;\">{{ pygIngresosFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Costo de ventas<\u002Fspan><span style=\"font-weight:600;\">{{ pygCostoFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"font-weight:600;\">Utilidad bruta<\u002Fspan><span style=\"font-weight:700;\">{{ pygUtilBrutaFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Gastos operativos<\u002Fspan><span style=\"font-weight:600;\">{{ pygGastosFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f4f6f6;\"><span style=\"color:#4b5559;\">(-) Obligaciones bancarias<\u002Fspan><span style=\"font-weight:600;\">{{ pygObligFmt }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:14px 0;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;\">Utilidad neta<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:{{ pygUtilNetaColor }};\">{{ pygUtilNetaFmt }} <span style=\"font-size:13px;color:#9aa3ac;\">({{ pygMargenNeto }}%)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Flujo de efectivo <span style=\"font-weight:400;color:#9aa3ac;font-size:13px;\">· últimos 12 meses (entradas: contado + cuotas cobradas · salidas: gastos + compras de inventario)<\u002Fspan><\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:16px 20px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;\">\n        <div><label style=\"display:block;font-size:13px;color:#4b5559;margin-bottom:6px;\">Capital inicial (COP)<\u002Flabel><input data-field=\"monto\" type=\"number\" value=\"{{ capitalMonto }}\" sc-camel-on-input=\"{{ onCapital }}\" placeholder=\"0\" style=\"width:200px;padding:11px 13px;border:1px solid #dde1e2;border-radius:10px;background:#fff;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;color:#4b5559;margin-bottom:6px;\">Fecha de inicio<\u002Flabel><input data-field=\"fecha\" type=\"date\" value=\"{{ capitalFecha }}\" sc-camel-on-input=\"{{ onCapital }}\" style=\"width:180px;padding:11px 13px;border:1px solid #dde1e2;border-radius:10px;background:#fff;\"><\u002Fdiv>\n        <div style=\"font-size:13px;color:#6b7479;\">Con el que arrancaste el negocio; se suma como saldo de partida antes de la tabla mensual.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;margin-bottom:22px;\">\n        <div style=\"overflow-x:auto;\">\n        <div style=\"min-width:700px;\">\n        <div style=\"display:flex;padding:14px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1;\">Mes<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Entradas<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Salidas<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Neto<\u002Fspan><span style=\"flex:1.3;text-align:right;\">Saldo acumulado<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ flujoMeses }}\" as=\"m\" hint-placeholder-count=\"12\">\n          <div style=\"display:flex;padding:10px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1;color:#4b5559;font-weight:600;\">{{ m.label }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;color:#0d9488;\">{{ m.entradasFmt }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;color:#b45309;\">{{ m.salidasFmt }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;font-weight:600;color:{{ m.netoColor }};\">{{ m.netoFmt }}<\u002Fspan>\n            <span style=\"flex:1.3;text-align:right;font-weight:700;\">{{ m.saldoAcumFmt }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Capital inyectado <span style=\"font-weight:400;color:#9aa3ac;font-size:13px;\">· aportes adicionales de socios/dueño después del arranque<\u002Fspan><\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:flex-end;padding:14px 0 4px;\">\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openCapital }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;\">+ Nuevo ingreso de capital<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;padding:10px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1.1;\">Fecha<\u002Fspan><span style=\"flex:2.6;\">Descripción<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Monto<\u002Fspan><span style=\"flex:.6;text-align:right;\">Acción<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ capitalInyList }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <div class=\"grow\" style=\"display:flex;padding:12px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1.1;color:#6b7479;font-size:13px;\">{{ c.fechaFmt }}<\u002Fspan>\n            <span style=\"flex:2.6;\">{{ c.descripcion }}<\u002Fspan>\n            <span style=\"flex:1.2;text-align:right;font-weight:600;color:#0d9488;\">{{ c.montoFmt }}<\u002Fspan>\n            <span style=\"flex:.6;text-align:right;\"><span sc-camel-on-click=\"{{ c.onDel }}\" title=\"Eliminar\" style=\"color:#c9cdd2;cursor:pointer;font-size:15px;padding:2px;\">✕<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Gastos fijos <span style=\"font-weight:400;color:#9aa3ac;font-size:13px;\">· obligaciones bancarias (préstamos, tarjetas, arrendamientos financieros)<\u002Fspan><\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:flex-end;padding:14px 0 4px;\">\n          <div class=\"gbtn\" sc-camel-on-click=\"{{ openOblig }}\" style=\"background:#14b8a6;color:#0d1013;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;\">+ Nueva obligación<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;padding:10px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1.6;\">Entidad<\u002Fspan><span style=\"flex:1.2;\">Tipo<\u002Fspan><span style=\"flex:1.3;text-align:right;\">Cuota mensual<\u002Fspan><span style=\"flex:1;text-align:center;\">Día pago<\u002Fspan><span style=\"flex:1.2;\">Inicio<\u002Fspan><span style=\"flex:1;text-align:center;\">Cuotas<\u002Fspan><span style=\"flex:1;text-align:center;\">Estado<\u002Fspan><span style=\"flex:.7;text-align:right;\">Acción<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ obligList }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div class=\"grow\" style=\"display:flex;padding:12px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1.6;font-weight:600;\">{{ o.entidad }}<\u002Fspan>\n            <span style=\"flex:1.2;color:#4b5559;\">{{ o.tipo }}<\u002Fspan>\n            <span style=\"flex:1.3;text-align:right;font-weight:600;\">{{ o.montoCuotaFmt }}<\u002Fspan>\n            <span style=\"flex:1;text-align:center;color:#6b7479;font-size:13px;\">{{ o.diaPago }}<\u002Fspan>\n            <span style=\"flex:1.2;color:#6b7479;font-size:13px;\">{{ o.fechaInicioFmt }}<\u002Fspan>\n            <span style=\"flex:1;text-align:center;color:#6b7479;font-size:13px;\">{{ o.cuotasLabel }}<\u002Fspan>\n            <span style=\"flex:1;text-align:center;\"><span sc-camel-on-click=\"{{ o.onToggle }}\" style=\"background:{{ o.estBg }};color:{{ o.estFg }};font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;\">{{ o.estLabel }}<\u002Fspan><\u002Fspan>\n            <span style=\"flex:.7;text-align:right;display:flex;gap:6px;justify-content:flex-end;\">\n              <span sc-camel-on-click=\"{{ o.onEdit }}\" title=\"Editar\" style=\"color:#7b8590;cursor:pointer;font-size:15px;padding:2px;\">✎<\u002Fspan>\n              <span sc-camel-on-click=\"{{ o.onDel }}\" title=\"Eliminar\" style=\"color:#c9cdd2;cursor:pointer;font-size:15px;padding:2px;\">✕<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:12px;\">Gastos registrados<\u002Fdiv>\n      <div class=\"gcard\" style=\"padding:4px 20px 10px;\">\n        <div style=\"display:flex;padding:14px 0 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ac;border-bottom:1px solid #eef1f1;\">\n          <span style=\"flex:1.1;\">Fecha<\u002Fspan><span style=\"flex:1.3;\">Categoría<\u002Fspan><span style=\"flex:2.4;\">Descripción<\u002Fspan><span style=\"flex:1.2;text-align:right;\">Monto<\u002Fspan><span style=\"flex:.6;text-align:right;\">Acción<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ gastosList }}\" as=\"g\" hint-placeholder-count=\"4\">\n          <div class=\"grow\" style=\"display:flex;padding:12px 0;font-size:14px;border-bottom:1px solid #f4f6f6;align-items:center;\">\n            <span style=\"flex:1.1;color:#6b7479;font-size:13px;\">{{ g.fech /1000)*1000;\n  const pagos=[];\n  let acumulado=0;\n  for(let i=1;i<=n;i++){\n    const monto=i===n?(restante-acumulado):base;\n    acumulado+=monto;\n    pagos.push({numero:i,fechaProgramada:addDays(fechaInicio,step*(i-1)),pagada:false,fechaPago:null,monto});\n  }\n  return pagos;\n}\n\nclass Component extends DCLogic {\n  state={\n    module:'dashboard', loaded:false, ventas:[], inventario:[], clientes:[],\n    period:'all', dashEstado:'all', ventaSearch:'', cliSearch:'', invSearch:'',\n    ventaSort:{key:'fecha',dir:'desc'}, cliSort:{key:'total',dir:'desc'},\n    cot:{producto:'',costo:'',gananciaModo:'PCT',ganancia:'30',gananciaValor:'',recargoCredito:'15',tipoPago:'CONTADO',tel:''},\n    showVenta:false, ventaForm:this.blankVenta(),\n    showInv:false, invForm:this.blankInv(),\n    showPago:false, pagoVentaId:null, pagoNumero:null, pagoForm:{fecha:today(),monto:''},\n    editName:{key:null,value:''},\n    gastos:[], showGasto:false, gastoForm:this.blankGasto(),\n    capitalInicial:{monto:0,fecha:today()}, cobrosOpen:null,\n    capitalInyectado:[], showCapital:false, capitalForm:this.blankCapital(),\n    session:null, profile:null, authEmail:(function(){try{return localStorage.getItem('mattcell_remember_email')||'';}catch(e){return '';}})(),\n    authPassword:'', authError:'', authBusy:false, authRemember:(function(){try{return localStorage.getItem('mattcell_remember_email')!=null;}catch(e){return true;}})(),\n    dataLoaded:false, migrating:false,\n    obligaciones:[], showOblig:false, obligForm:this.blankOblig()\n  };\n  blankCapital(){return {id:null,fecha:today(),descripcion:'',monto:''};}\n  blankOblig(){return {id:null,entidad:'',tipo:'Préstamo',montoCuota:'',diaPago:'5',fechaInicio:today(),cuotasTotales:'',cuotasPagadas:'0',activa:true};}\n\n  // ---------- AUTH ----------\n  onAuthField=(e)=>{const f=e.target.dataset.field,v=e.target.value;this.setState({[f==='email'?'authEmail':'authPassword']:v,authError:''});};\n  onAuthRemember=(e)=>this.setState({authRemember:e.target.checked});\n  onLoginSubmit=(e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.doLogin(); };\n  doLogin=async()=>{\n    if(this.state.authBusy)return;\n    const email=(this.state.authEmail||'').trim(), password=this.state.authPassword||'';\n    if(!email||!password){this.setState({authError:'Ingresa correo y contraseña'});return;}\n    if(!this.supabase){this.setState({authError:'La conexión aún no está lista. Espera un momento y vuelve a intentar.'});return;}\n    this.setState({authBusy:true,authError:''});\n    try{\n      const {data,error}=await this.supabase.auth.signInWithPassword({email,password});\n      if(error){ this.setState({authBusy:false,authError:error.message||'Credenciales inválidas o usuario no existe.'}); return; }\n      if(!data||!data.session){ this.setState({authBusy:false,authError:'No se pudo iniciar sesión (sin sesión devuelta). Verifica que el usuario esté confirmado.'}); return; }\n      try{ if(this.state.authRemember) localStorage.setItem('mattcell_remember_email',email); else localStorage.removeItem('mattcell_remember_email'); }catch(e){}\n      await this.onSession(data.session);\n      this.setState({authBusy:false,authPassword:''});\n    }catch(err){\n      this.setState({authBusy:false,authError:'Error inesperado: '+(err&&err.message?err.message:String(err))});\n    }\n  };\n  doLogout=async()=>{ await this.supabase.auth.signOut(); this.setState({session:null,profile:null,dataLoaded:false}); };\n  onSession=async(session)=>{\n    this.setState({session});\n    try{\n      let {data:profile,error:pErr}=await this.supabase.from('profiles').select('*').eq('id',session.user.id).maybeSingle();\n      if(pErr) throw pErr;\n      if(!profile){\n        const ins={id:session.user.id,email:session.user.email,nombre:session.user.email.split('@')[0],rol:'vendedor'};\n        const {error:iErr}=await this.supabase.from('profiles').insert(ins);\n        if(iErr) throw iErr;\n        profile=ins;\n      }\n      this.setState({profile});\n      await this.loadAllData();\n    }catch(err){\n      this.setState({authError:'No se pudo cargar tu perfil: '+(err&&err.message?err.message:String(err)),session:null,dataLoaded:false});\n      await this.supabase.auth.signOut();\n    }\n  };\n\n  // ---------- DATA LOAD (Supabase) ----------\n  async loadAllData(){\n    const sb=this.supabase;\n    const safe=async(p)=>{ try{ return await p; }catch(e){ return {data:null,error:e}; } };\n    const [cli,ven,inv,gas,capIni,capIny,obl]=await Promise.all([\n      safe(sb.from('clientes').select('*')), safe(sb.from('ventas').select('*')), safe(sb.from('inventario').select('*')),\n      safe(sb.from('gastos').select('*')), safe(sb.from('capital_inicial').select('*').eq('id',1).maybeSingle()),\n      safe(sb.from('capital_inyectado').select('*')), safe(sb.from('obligaciones').select('*'))\n    ]);\n    const clientes=(cli.data||[]).map(c=>({key:c.key,nombre:c.nombre,idCliente:c.id_cliente||'',direccion:c.direccion||'',telefono:c.telefono||''}));\n    const ventas=(ven.data||[]).map(v=>({id:v.id,fecha:v.fecha,clienteKey:v.cliente_key,cliente:v.cliente,marca:v.marca||'',modelo:v.modelo,\n      capacidad:v.capacidad||'',color:v.color||'',condicion:v.condicion||'NUEVO',imei:v.imei||'',proveedor:v.proveedor||'',\n      metodoPago:v.metodo_pago||'EFECTIVO',costoCop:+v.costo_cop||0,pvp:+v.pvp||0,utilidad:+v.utilidad||0,\n      tipoPago:v.tipo_pago||'CONTADO',credito:v.credito||null,updatedAt:v.updated_at}));\n    const inventario=(inv.data||[]).map(it=>({id:it.id,fechaCompra:it.fecha_compra,marca:it.marca||'',modelo:it.modelo,\n      capacidad:it.capacidad||'',color:it.color||'',condicion:it.condicion||'NUEVO',imei:it.imei||'',proveedor:it.proveedor||'',\n      cantidad:it.cantidad||1,costoCop:+it.costo_cop||0,valorVenta:+it.valor_venta||0,vendido:!!it.vendido,fechaVenta:it.fecha_venta}));\n    const gastos=(gas.data||[]).map(g=>({id:g.id,fecha:g.fecha,categoria:g.categoria,descripcion:g.descripcion,monto:+g.monto||0}));\n    const capitalInicial=capIni.data?{monto:+capIni.data.monto||0,fecha:capIni.data.fecha||today()}:{monto:0,fecha:today()};\n    const capitalInyectado=(capIny.data||[]).map(c=>({id:c.id,fecha:c.fecha,descripcion:c.descripcion,monto:+c.monto||0}));\n    const obligaciones=(obl.data||[]).map(o=>({id:o.id,entidad:o.entidad,tipo:o.tipo,montoCuota:+o.monto_cuota||0,\n      diaPago:o.dia_pago||1,fechaInicio:o.fecha_inicio,cuotasTotales:o.cuotas_totales||0,activa:o.activa!==false}));\n    this.setState({clientes,ventas,inventario,gastos,capitalInicial,capitalInyectado,obligaciones,dataLoaded:true});\n  }\n\n  // full-replace sync helpers (simple + robust for small business datasets)\n  async syncClientes(rows){ const sb=this.supabase; await sb.from('clientes').delete().not('key','is',null);\n    if(rows.length) await sb.from('clientes').insert(rows.map(c=>({key:c.key,nombre:c.nombre,id_cliente:c.idCliente||'',direccion:c.direccion||'',telefono:c.telefono||''}))); }\n  async syncVentas(rows){ const sb=this.supabase; await sb.from('ventas').delete().not('id','is',null);\n    if(rows.length) await sb.from('ventas').insert(rows.map(v=>({id:v.id,fecha:v.fecha,cliente_key:v.clienteKey,cliente:v.cliente,marca:v.marca||'',\n      modelo:v.modelo,capacidad:v.capacidad||'',color:v.color||'',condicion:v.condicion,imei:v.imei||'',proveedor:v.proveedor||'',\n      metodo_pago:v.metodoPago,costo_cop:v.costoCop||0,pvp:v.pvp||0,utilidad:v.utilidad||0,tipo_pago:v.tipoPago,credito:v.credito,updated_at:v.updatedAt}))); }\n  async syncInventario(rows){ const sb=this.supabase; await sb.from('inventario').delete().not('id','is',null);\n    if(rows.length) await sb.from('inventario').insert(rows.map(it=>({id:it.id,fecha_compra:it.fechaCompra,marca:it.marca||'',modelo:it.modelo,\n      capacidad:it.capacidad||'',color:it.color||'',condicion:it.condicion,imei:it.imei||'',proveedor:it.proveedor||'',cantidad:it.cantidad||1,\n      costo_cop:it.costoCop||0,valor_venta:it.valorVenta||0,vendido:!!it.vendido,fecha_venta:it.fechaVenta||null}))); }\n  async syncGastos(rows){ const sb=this.supabase; await sb.from('gastos').delete().not('id','is',null);\n    if(rows.length) await sb.from('gastos').insert(rows.map(g=>({id:g.id,fecha:g.fecha,categoria:g.categoria,descripcion:g.descripcion,monto:g.monto||0}))); }\n  async syncCapitalInicial(ci){ await this.supabase.from('capital_inicial').upsert({id:1,monto:ci.monto||0,fecha:ci.fecha}); }\n  async syncCapitalInyectado(rows){ const sb=this.supabase; await sb.from('capital_inyectado').delete().not('id','is',null);\n    if(rows.length) await sb.from('capital_inyectado').insert(rows.map(c=>({id:c.id,fecha:c.fecha,descripcion:c.descripcion,monto:c.monto||0}))); }\n  async syncObligaciones(rows){ const sb=this.supabase; await sb.from('obligaciones').delete().not('id','is',null);\n    if(rows.length) await sb.from('obligaciones').insert(rows.map(o=>({id:o.id,entidad:o.entidad,tipo:o.tipo,monto_cuota:o.montoCuota||0,\n      dia_pago:o.diaPago||1,fecha_inicio:o.fechaInicio,cuotas_totales:o.cuotasTotales||0,activa:!!o.activa}))); }\n\n  migrarLocal=async()=>{\n    let saved=null; try{saved=JSON.parse(localStorage.getItem(KEY));}catch(e){}\n    if(!saved){alert('No se encontraron datos locales.');return;}\n    this.setState({migrating:true});\n    const {clientes,ventas}=this.migrate(saved.ventas||[],saved.clientes||[]);\n    await Promise.all([\n      this.syncClientes(clientes), this.syncVentas(ventas), this.syncInventario(saved.inventario||[]),\n      this.syncGastos(saved.gastos||[]), this.syncCapitalInicial(saved.capitalInicial||{monto:0,fecha:today()}),\n      this.syncCapitalInyectado(saved.capitalInyectado||[])\n    ]);\n    localStorage.removeItem(KEY);\n    await this.loadAllData();\n    this.setState({migrating:false});\n    alert('Datos migrados a la base de datos compartida.');\n  };\n  blankGasto(){return {id:null,fecha:today(),categoria:'Operativo',descripcion:'',monto:''};}\n  blankVenta(){return {id:null,fecha:today(),clienteKey:'',cliente:'',clienteIdNew:'',marca:'',modelo:'',capacidad:'',color:'',condicion:'NUEVO',imei:'',proveedor:'',metodoPago:'EFECTIVO',costoCop:'',pvp:'',tipoPago:'CONTADO',cuotas:'3',frecuencia:'MENSUAL',fechaInicio:today(),abonoInicial:'',gananciaModo:'PCT',gananciaValor:'30',recargoModo:'PCT',recargoValor:'15'};}\n  blankInv(){return {id:null,fechaCompra:today(),marca:'',modelo:'',capacidad:'',color:'',condicion:'NUEVO',imei:'',proveedor:'',cantidad:'1',costoCop:'',gananciaModo:'PCT',gananciaPct:'30',gananciaValor:'',valorVenta:''};}\n\n  migrate(ventas,savedClientes){\n    const clientes=(savedClientes||[]).map(c=>({key:c.key||genKey(),nombre:c.nombre,idCliente:c.idCliente||'',direccion:c.direccion||'',telefono:c.telefono||''}));\n    const byName={}; clientes.forEach(c=>{ if(!byName[c.nombre]) byName[c.nombre]=c; });\n    const byKey={}; clientes.forEach(c=>{byKey[c.key]=c;});\n    const ensure=(nombre)=>{ if(byName[nombre])return byName[nombre]; const c={key:genKey(),nombre,idCliente:'',direccion:'',telefono:''}; byName[nombre]=c; byKey[c.key]=c; clientes.push(c); return c; };\n    const v2=ventas.map(v=>{ if(v.clienteKey&&byKey[v.clienteKey])return v; const c=ensure(v.cliente); return {...v,clienteKey:c.key}; });\n    return {clientes,ventas:v2};\n  }\n  componentDidMount(){\n    this.initSupabase(0);\n  }\n  initSupabase(retries){\n    const lib=(typeof window!=='undefined')?window.supabase:undefined;\n    if(lib && lib.createClient){\n      this.supabase=lib.createClient(SUPA_URL,SUPA_ANON);\n      this.setState({loaded:true});\n      this.supabase.auth.getSession().then(({data})=>{ if(data&&data.session) this.onSession(data.session); });\n      this.supabase.auth.onAuthStateChange((event,session)=>{\n        if(event==='SIGNED_OUT'){ this.setState({session:null,profile:null,dataLoaded:false}); }\n      });\n      return;\n    }\n    if(retries<60){ setTimeout(()=>this.initSupabase(retries+1),150); return; }\n    this.setState
